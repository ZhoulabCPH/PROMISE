# =============================================================================
# config.yaml
# Configuration for WSI-to-Protein multi-modal training pipeline.
#
# Instructions:
#   1. Update all paths under "Data Paths" to match your local directory layout.
#   2. To switch foundation model encoders, uncomment ONE block under
#      "WSI Patch Feature Paths" and comment out the rest.
#   3. To resume training, set `initial_checkpoint` to the saved .pth file.
# =============================================================================


# -----------------------------------------------------------------------------
# Training Hyperparameters
# -----------------------------------------------------------------------------
seed: 2023
start_lr: 5e-4
batch_size: 8
start_epoch: 0
Epoch: 10000
workers: 0

# -----------------------------------------------------------------------------
# Model Architecture
# -----------------------------------------------------------------------------
Cluster_num: 64
Instance_num: 2048
Feature_dim: 128
SwinTransform: 768
Patch_number: 3000
Laten_Dim: 512
Result_Dim: 512

# Hidden dimensions for the encoder layers:
#   [input_dim, hidden_1, hidden_2, hidden_3]
Linears_list: [6646, 4096, 2048, 1024]
Linears_list_WSI: [6409, 4096, 2048, 1024]

# -----------------------------------------------------------------------------
# Loss Function
# -----------------------------------------------------------------------------
cluster_temperature: 1.0
instance_temperature: 0.5
lambd: 0.001
alpha: 0.005
weight_decay: 0.

# -----------------------------------------------------------------------------
# Checkpoints
# -----------------------------------------------------------------------------
# Set to "None" to train from scratch; otherwise provide the .pth file path.
initial_checkpoint: "Result/10X_UNI_Model/UNI_10X_PreMultiModel.pth"
Locked_checkpoint: "Result/10X_UNI_Model/WSI_Pre_Protein.pth"
Model_Out: "Result/"

# -----------------------------------------------------------------------------
# WSI Patch Feature Paths
# Update <DATA_ROOT> to your local feature directory.
# Uncomment ONE encoder block below that matches the features you extracted.
# -----------------------------------------------------------------------------

## -- UNI at 10X (default) --
CHCAMS_Discovery_Image: "<DATA_ROOT>/UNI_10X/CHCAMS_Discovery_UNI.pkl"
CHCAMS_External_Image:  "<DATA_ROOT>/UNI_10X/External_CHCAMS_UNI.pkl"
HMUCH_External_Image:   "<DATA_ROOT>/UNI_10X/HMUCH_External_UNI.pkl"
TMUGH_External_Image:   "<DATA_ROOT>/UNI_10X/TMUGH_External_UNI.pkl"

